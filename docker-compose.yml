services:
  node-red:
    build: .  # Isso usa o Dockerfile no diretório atual
    container_name: node-red-khomp
    restart: unless-stopped
    ports:
      - "1881:1880"  # Porta 1881 no host para 1880 no container
    volumes:
      - ./data:/data
      - ./flows:/data/flows
    environment:
      - TZ=America/Sao_Paulo
      - NODE_RED_ENABLE_SAFE_MODE=false
    networks:
      - iot-network

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto-khomp
    restart: unless-stopped
    ports:
      - "1884:1883"  # Porta 1884 no host para não conflitar
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge